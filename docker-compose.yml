# ============================================================
#  docker-compose.yml
#  Orquestacion local del servicio de la API de readmision.
#  Uso:  docker compose up --build
# ============================================================
services:
  readmision-api:
    build: .
    image: readmision-api:1.0.0
    container_name: readmision-api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health').getcode()==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
